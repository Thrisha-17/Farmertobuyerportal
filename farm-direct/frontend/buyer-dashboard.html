<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>My Orders — FarmDirect</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="dashboard">
<div id="navbar"></div>

<header class="page-header">
  <div class="page-header-inner">
    <h1>Welcome, <span id="hi">friend</span>.</h1>
    <p>Track your orders and discover what's freshly harvested today.</p>
  </div>
</header>

<main class="container">
  <div class="dash-grid" id="kpis"></div>

  <div class="dash-section">
    <h2>Your orders <a href="products.html" class="btn btn-primary btn-sm">Shop more</a></h2>
    <div id="orders" class="table-wrap">
      <div class="empty"><h3>Loading…</h3></div>
    </div>
  </div>
</main>

<div id="footer"></div>
<script src="js/api.js"></script>
<script>
if (!requireAuth('BUYER')) { /* will redirect */ } else {
  document.getElementById('hi').textContent = (Auth.user().name || 'friend').split(' ')[0];
  loadAll();
}

async function loadAll() {
  try {
    const orders = await Api.buyerOrders();
    renderKpis(orders);
    renderOrders(orders);
  } catch (err) {
    document.getElementById('orders').innerHTML =
      `<div class="empty"><h3>Could not load</h3><p>${escapeHtml(err.message)}</p></div>`;
  }
}

function renderKpis(orders) {
  const total   = orders.length;
  const active  = orders.filter(o => ['PENDING','CONFIRMED','SHIPPED'].includes(o.status)).length;
  const done    = orders.filter(o => o.status === 'DELIVERED').length;
  const spent   = orders.reduce((s, o) => s + Number(o.totalPrice || 0), 0);
  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><small>Total orders</small><div class="v">${total}</div></div>
    <div class="kpi"><small>In progress</small><div class="v">${active}</div></div>
    <div class="kpi"><small>Delivered</small><div class="v">${done}</div></div>
    <div class="kpi"><small>Total spent</small><div class="v">${fmtMoney(spent)}</div></div>
  `;
}

function renderOrders(orders) {
  if (!orders.length) {
    document.getElementById('orders').innerHTML =
      `<div class="empty"><h3>No orders yet</h3><p>Browse the marketplace and order from a farmer near you.</p>
       <p style="margin-top:12px;"><a class="btn btn-primary" href="products.html">Browse marketplace</a></p></div>`;
    return;
  }
  document.getElementById('orders').innerHTML = `
    <table>
      <thead>
        <tr><th>Product</th><th>Farmer</th><th>Qty</th><th>Total</th><th>Status</th><th>Ordered</th><th>Contact</th></tr>
      </thead>
      <tbody>
        ${orders.map(o => `
          <tr>
            <td><strong>${escapeHtml(o.productName || '—')}</strong></td>
            <td>${escapeHtml(o.farmerName || '—')}</td>
            <td>${o.quantity} ${escapeHtml(o.productUnit || '')}</td>
            <td><strong>${fmtMoney(o.totalPrice)}</strong></td>
            <td><span class="status-pill status-${o.status.toLowerCase()}">${o.status}</span></td>
            <td>${fmtDate(o.createdAt)}</td>
            <td>${escapeHtml(o.farmerPhone || '—')}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}
</script>
</body>
</html>
