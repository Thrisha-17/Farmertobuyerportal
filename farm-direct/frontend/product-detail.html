<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Product — FarmDirect</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="products">
<div id="navbar"></div>

<main class="container" id="root">
  <div class="empty"><h3>Loading…</h3></div>
</main>

<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <h2>Place your order</h2>
    <form id="orderForm">
      <div class="form-group">
        <label>Quantity</label>
        <input type="number" id="qty" class="input" value="1" min="1" required />
      </div>
      <div class="form-group">
        <label>Delivery address</label>
        <textarea id="address" class="textarea" required placeholder="House, street, city, pin code…"></textarea>
      </div>
      <div class="form-group">
        <label>Notes for the farmer <span style="color:var(--muted); font-weight:400;">(optional)</span></label>
        <textarea id="notes" class="textarea" placeholder="Preferred delivery time, ripeness preference…"></textarea>
      </div>
      <div id="orderTotal" style="background:var(--cream-2); padding:12px 16px; border-radius:12px; margin:14px 0; font-weight:600;"></div>
      <div style="display:flex; gap:10px; justify-content:flex-end;">
        <button type="button" class="btn btn-ghost" id="cancelOrder">Cancel</button>
        <button type="submit" class="btn btn-primary" id="confirmOrder">Confirm order</button>
      </div>
    </form>
  </div>
</div>

<div id="footer"></div>
<script src="js/api.js"></script>
<script>
const id = new URLSearchParams(location.search).get('id');
let product = null;

async function load() {
  if (!id) { document.getElementById('root').innerHTML = '<div class="empty"><h3>No product selected</h3></div>'; return; }
  try {
    product = await Api.getProduct(id);
    render();
  } catch (err) {
    document.getElementById('root').innerHTML = `<div class="empty"><h3>Could not load</h3><p>${escapeHtml(err.message)}</p></div>`;
  }
}

function render() {
  const p = product;
  const initials = (p.farmerName || 'F').split(' ').map(x => x[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('root').innerHTML = `
    <a href="products.html" style="display:inline-block; margin-bottom:20px; color:var(--green-700); font-weight:600;">← Back to marketplace</a>
    <div class="detail-grid">
      <div class="detail-img" style="background-image:url('${escapeHtml(p.imageUrl || '')}')"></div>
      <div class="detail-info">
        <span class="detail-cat">${escapeHtml(p.category)}</span>
        <h1>${escapeHtml(p.name)}</h1>
        <div class="detail-price">${fmtMoney(p.pricePerUnit)} <small>per ${escapeHtml(p.unit)}</small></div>

        <p style="color:var(--muted); margin-bottom:8px;">${escapeHtml(p.description || 'Fresh from the farm.')}</p>

        <div class="detail-meta">
          <div><small>Available</small><strong>${p.quantityAvailable} ${escapeHtml(p.unit)}</strong></div>
          <div><small>Harvested</small><strong>${fmtDate(p.harvestDate)}</strong></div>
          <div><small>Category</small><strong>${escapeHtml(p.category)}</strong></div>
          <div><small>Origin</small><strong>${escapeHtml(p.farmerLocation || '—')}</strong></div>
        </div>

        <div class="farmer-card">
          <div class="farmer-avatar">${escapeHtml(initials)}</div>
          <div>
            <strong>${escapeHtml(p.farmerName || 'Farmer')}</strong>
            <div class="meta">${escapeHtml(p.farmerLocation || '')}</div>
          </div>
        </div>

        <button class="btn btn-primary" id="orderBtn" ${p.quantityAvailable<1?'disabled':''}>
          ${p.quantityAvailable<1 ? 'Out of stock' : 'Order now'}
        </button>
      </div>
    </div>
  `;
  document.getElementById('orderBtn').addEventListener('click', openOrder);
}

function openOrder() {
  if (!Auth.isLoggedIn()) {
    toast('Please log in to place an order', 'info');
    setTimeout(() => location.href = 'login.html?redirect=' + encodeURIComponent(location.pathname + location.search), 700);
    return;
  }
  if (!Auth.isBuyer()) { toast('Only buyer accounts can place orders', 'error'); return; }
  document.getElementById('qty').max = product.quantityAvailable;
  updateTotal();
  document.getElementById('orderModal').classList.add('show');
}

function updateTotal() {
  const q = Math.max(1, Number(document.getElementById('qty').value || 1));
  const total = q * Number(product.pricePerUnit);
  document.getElementById('orderTotal').textContent =
    `Total: ${fmtMoney(total)} (${q} × ${fmtMoney(product.pricePerUnit)})`;
}

document.addEventListener('input', (e) => { if (e.target.id === 'qty') updateTotal(); });
document.getElementById('cancelOrder').addEventListener('click', () =>
  document.getElementById('orderModal').classList.remove('show'));

document.getElementById('orderForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('confirmOrder');
  btn.disabled = true; btn.textContent = 'Placing…';
  try {
    await Api.placeOrder({
      productId: product.id,
      quantity: Number(document.getElementById('qty').value),
      deliveryAddress: document.getElementById('address').value.trim(),
      notes: document.getElementById('notes').value.trim(),
    });
    toast('Order placed! The farmer has been notified.');
    setTimeout(() => location.href = 'buyer-dashboard.html', 800);
  } catch (err) {
    toast(err.message || 'Order failed', 'error');
    btn.disabled = false; btn.textContent = 'Confirm order';
  }
});

load();
</script>
</body>
</html>
